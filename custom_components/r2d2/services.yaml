move:
  name: Move
  description: Drive R2D2 in a direction for a set number of seconds, then stop automatically.
  fields:
    direction:
      name: Direction
      description: "Direction to move: forward, reverse, left, or right."
      required: true
      selector:
        select:
          options:
            - forward
            - forward_left
            - forward_right
            - left
            - right
            - reverse
            - reverse_left
            - reverse_right
    move_for:
      name: Duration (seconds)
      description: How many seconds to move before stopping automatically.
      required: true
      selector:
        number:
          min: 0.1
          max: 30
          step: 0.1
          unit_of_measurement: s
    speed:
      name: Speed
      description: "Motor speed: 0 (slowest) to 3 (fastest). Defaults to 3."
      required: false
      selector:
        number:
          min: 0
          max: 3
          step: 1

stop:
  name: Stop
  description: Stop all motors immediately, cancelling any in-progress move.

play_sound:
  name: Play Sound
  description: Play one of R2D2's built-in sound effects.
  fields:
    sound:
      name: Sound
      description: Which sound effect to play.
      required: true
      selector:
        select:
          options:
            - sfx_1
            - sfx_2
            - sfx_3
            - sfx_4
            - sfx_5
            - sfx_6
            - sfx_7
            - sfx_8
            - sfx_9
            - sfx_10

set_head:
  name: Set Head Position
  description: Rotate R2D2's head to a preset position.
  fields:
    position:
      name: Position
      description: "Target head position: left, center, or right."
      required: true
      selector:
        select:
          options:
            - left
            - center
            - right

set_leds:
  name: Set LEDs
  description: Set the brightness of R2D2's blue and/or red LEDs.
  fields:
    blue:
      name: Blue LED
      description: "Blue LED brightness: 0 (off) to 3 (max)."
      required: false
      selector:
        number:
          min: 0
          max: 3
          step: 1
    red:
      name: Red LED
      description: "Red LED brightness: 0 (off) to 3 (max)."
      required: false
      selector:
        number:
          min: 0
          max: 3
          step: 1
